<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword-Based Chatbot</title>

    <!-- ===============================
         CSS (기존 chatbot.css 통합)
    ================================ -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            color: #000000;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .chatbox {
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width:600px;
            height: 100%;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .chat-display {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #ffffff;
            font-size: 16px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .chat-message {
            max-width: 90%;
            padding: 12px 16px;
            margin: 8px;
            border-radius: 16px;
            position: relative;

            white-space: pre-wrap;      /* 줄바꿈 + <br> 유지 */
            word-break: keep-all;       /* 단어 중간 분리 방지 */
            overflow-wrap: break-word;  /* 너무 긴 단어만 예외적으로 줄바꿈 */

            line-height: 1.55;
        }

        .chat-message.user {
            align-self: flex-end;
            background-color: #d0e8ff;
            color: #000000;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-message.bot {
            align-self: flex-start;
            background-color: #d6f7da;
            color: #000000;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
        }

        .input-area input {
            flex-grow: 1;
            padding: 35px;
            border: none;
            background-color: #f2f2f2;
            color: #000000;
            font-size: 16px;
            outline: none;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .input-area button {
            padding: 15px 25px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            transition: background-color 0.3s;
        }

        .input-area button:hover {
            background-color: #45a049;
        }

        .paragraph-divider {
            border: none;
            border-top: 1px solid #7c7c7c;
            margin: 24px 0;
        }

        .chat-message .bullet {
            display: block;
            padding-left: 1.8em;   /* 전체 들여쓰기 */
            text-indent: -0.8em;   /* 첫 줄만 앞으로 당김 */
        }

    </style>
</head>

<body>
<div class="container">
    <div class="chatbox">

                   autocomplete="off" autocorrect="off"

            <button onclick="handleSubmit()">보내기</button>
        </div>
    </div>
</div>

    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"

        .split("------------")
        .map(p => p.trim())
        .join('<hr class="paragraph-divider">');
}

/* 키워드 매칭 함수 */
function getKeywordAnswer(message) {
  let bestAnswer = null;
  let highestScore = 0;

  for (const item of responses) {
    let score = 0;

    for (const keywordObj of item.keywords) {
      if (message.includes(keywordObj.word)) {
        score += keywordObj.weight;
      }
    }

    if (score > highestScore) {
      highestScore = score;
      bestAnswer = item.answer;
    }
  }

  return bestAnswer || "죄송해요, 무슨 말인지 잘 모르겠어요.";
}

/* 메시지 처리 */
const delayInSeconds = 3;

function handleSubmit() {
  const message = userInput.value.trim();
  if (!message) return;

  // 1. 사용자 메시지 출력
  addMessage(message, "user");
  userInput.value = "";

  // 2. 로딩 메시지
  const loading = document.createElement("div");
  loading.className = "chat-message bot";
  loading.textContent = "⏳ 잠시만 기다려 주세요...";
  chatDisplay.appendChild(loading);
  //chatDisplay.scrollTop = chatDisplay.scrollHeight;

  setTimeout(() => {
    chatDisplay.removeChild(loading);

    // 3. 봇 응답 생성
    const rawAnswer = getKeywordAnswer(message);
    const formattedAnswer = formatAnswerWithDivider(rawAnswer);

    // 4. 봇 응답 출력
    typeMessage(formattedAnswer, "bot");

    // 5. Google Script 저장
    saveChatLog(message, formattedAnswer);

  }, delayInSeconds * 1000);
}

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    msg.innerHTML = text;
    chatDisplay.appendChild(msg);
    //chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

function typeMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = `chat-message ${sender}`;
    chatDisplay.appendChild(msg);

    let i = 0, buffer = "";
    const typing = setInterval(() => {
        if (text[i] === "<") {
            const end = text.indexOf(">", i);
            buffer += text.slice(i, end + 1);
            i = end + 1;
        } else {
            buffer += text[i++];
        }
        msg.innerHTML = buffer;
        //chatDisplay.scrollTop = chatDisplay.scrollHeight;
        if (i >= text.length) clearInterval(typing);
    }, 20);
}

function getOrCreateParticipantId() {
  let pid = localStorage.getItem("participant_id");
  if (!pid) {
    pid = "P_" + crypto.randomUUID();
    localStorage.setItem("participant_id", pid);
  }
  return pid;
}

function addBotMessage(text) {
  const chatDisplay = document.getElementById("chatDisplay");

  const messageDiv = document.createElement("div");
  messageDiv.className = "chat-message bot";

  chatDisplay.appendChild(messageDiv); // ✔ DOM만 추가

  typeMessage(messageDiv, text);       // ✔ 타이핑 애니메이션
}

/* 초기 메시지 */
addMessage("안녕하세요! 무엇을 도와드릴까요?", "bot");
